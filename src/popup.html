<!doctype html>
<meta charset="utf-8">
<title>Carryover</title>
<style>
  :root{
    --bg:#ffffff; --ink:#27272a; --muted:#71717a; --line:rgba(9,9,11,.09);
    --accent:#4d6bfe; --hover:rgba(9,9,11,.04);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#1a1a1e; --ink:#e4e4e7; --muted:#a1a1aa; --line:rgba(255,255,255,.1);
      --accent:#8fa4ff; --hover:rgba(255,255,255,.06);
    }
  }
  *{box-sizing:border-box;margin:0}
  body{
    width:272px; background:var(--bg); color:var(--ink);
    font:13px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .top{padding:15px 15px 13px; border-bottom:1px solid var(--line)}
  .brand{display:flex; align-items:center; justify-content:space-between; gap:8px}
  h1{font-size:15px; font-weight:650; letter-spacing:-.01em}
  .ver{font-size:10.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .desc{margin-top:5px; font-size:12px; color:var(--muted); line-height:1.45}
  .chip{
    display:inline-block; margin-top:9px; padding:3px 8px; border-radius:999px;
    background:rgba(34,197,94,.13); color:#16a34a; font-size:10.5px; font-weight:650;
    letter-spacing:.03em;
  }
  @media (prefers-color-scheme:dark){ .chip{color:#4ade80} }
  nav{padding:6px}
  a.row{
    display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:8px;
    color:inherit; text-decoration:none; font-size:12.5px;
  }
  a.row:hover{background:var(--hover)}
  a.row svg{flex:none; opacity:.6}
  .arrow{margin-left:auto; opacity:.3; font-size:14px; line-height:1}
  .kofi-wrap{padding:4px 12px 14px}
  a.kofi{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 12px; border-radius:10px; text-decoration:none;
    background:#ff5e5b; color:#fff; font-size:12.5px; font-weight:650;
    box-shadow:0 1px 2px rgba(255,94,91,.4); transition:filter .15s ease, transform .12s ease;
  }
  a.kofi:hover{filter:brightness(1.06); transform:translateY(-1px)}
  .note{margin-top:8px; text-align:center; font-size:10.5px; color:var(--muted); line-height:1.5}
</style>

<div class="top">
  <div class="brand">
    <h1>Carryover</h1>
    <span class="ver">v__VERSION__</span>
  </div>
  <p class="desc">Shows how full the chat is, then compacts it into a handoff you can paste into a new one.</p>
  <span class="chip">NO DATA LEAVES YOUR BROWSER</span>
</div>
